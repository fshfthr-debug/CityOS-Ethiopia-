<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CityOS Ethiopia</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f4f4f4}
.sidebar{position:fixed;left:0;top:0;width:250px;height:100%;background:#0f172a;padding:20px;overflow:auto}
.sidebar h2,.sidebar a{color:#fff}
.sidebar a{display:block;text-decoration:none;padding:12px;margin:8px 0;background:#1e293b;border-radius:8px}
.main{margin-left:270px;padding:20px}
.hero{background:linear-gradient(135deg,#0b6e4f,#1f2937);padding:25px;color:#fff;border-radius:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;margin-top:20px}
.card{background:#fff;padding:20px;border-radius:15px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.kpi{font-size:32px;font-weight:bold;color:#0b6e4f}
button{padding:10px 18px;border:none;border-radius:8px;background:#0b6e4f;color:#fff;margin:5px;cursor:pointer}
</style>
</head>
<body>
<div class="sidebar">
<h2>🏙 CityOS Ethiopia</h2>
<a href="#">Dashboard</a>
<a href="#">Payments</a>
<a href="#">Visitors</a>
<a href="#">Fayda ID</a>
<a href="#">Vehicles</a>
<a href="#">IoT</a>
<a href="#">Analytics</a>
<a href="#">Mobile App</a>
</div>
<div class="main">
<div class="hero">
<h1>Smart Community Operating System</h1>
<p>Localized for Ethiopia • ETB • አማርኛ • Afaan Oromo • Tigrinya</p>
</div>
<div class="grid">
<div class="card"><div class="kpi">245</div>Residents</div>
<div class="card"><div class="kpi">ETB 125,000</div>Monthly Collections</div>
<div class="card"><div class="kpi">92%</div>Occupancy</div>
<div class="card"><div class="kpi">18</div>Maintenance Requests</div>
</div>
</div>
</body>
</html>
